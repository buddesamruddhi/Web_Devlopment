<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration Form</title>
</head>

<body>
    <h2>Employee Registration Form</h2>
    <form>
        <label>Full Name:</label><br>
        <input type="text" name="fullname"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" placeholder="10-digit number" pattern="[0-9]{10}" required><br><br>

        <label>Age:</label><br>
        <input type="number" name="age" min="18" max="60" required><br><br>



        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male">Male <br>
        <input type="radio" name="gender" value="Female">Female <br>
        <input type="radio" name="gender" value="other">Other <br><br>

        <label>Department</label><br>
        <select name="Department" id="">
            <option value=>HR</option>
            <option value=>Software Developer</option>
            <option value=>Manager</option>
            <option value=>Tester</option>
        </select> <br><br>

        <label for="">Skills:</label><br>
        <input type="checkbox" value="Java" name="Java" id=""> Java <br>
        <input type="checkbox" value="Python" name="Python" id="">Python <br>
        <input type="checkbox" value="C++" name="C++" id="">C++ <br>
        <input type="checkbox" value="Web Development" name="C++" id="">Web Development <br><br>

        <label for="">Address:</label><br>
        <textarea name="Address" id=""></textarea><br><br>

        <label for="">Date of Joining:</label><br>
        <input type="date" name="doj" id=""><br> <br>

        <input type="submit" value="Register">



    </form>
</body>

</html>

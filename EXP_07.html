<h1>Demonstration of Link Tag</h1>

<p>This webpage shows how images can be used as links.</p>

<h2>1. Image as a Link</h2>

<a href="https://www.google.com" target="_blank">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoFK7hOddt3YIJJtbHP2E05TYdWbF9YJffpA&s"
         alt="Google"
         width="200"
         height="150">
</a>

<p>Click the above icon to open Google.</p>


<h2>2. Image with Text as Link</h2>

<a href="https://www.wikipedia.org" target="_blank">

<img src="https://via.placeholder.com/150"
     alt="Wikipedia"
     width="150"
     height="150">

<p>Click this image to open Wikipedia.</p>

</a>

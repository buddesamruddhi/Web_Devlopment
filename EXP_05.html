<!DOCTYPE html>
<html>

<head>
    <title>Image Gallery</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .item {
            width: 300px;
        }

        .item img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .item img:hover {
            transform: scale(1.1);
        }

        .item p {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Top 5 Places in Kolhapur</h1>

    <div class="gallery">

        <div class="item">
            <img src="https://www.fabhotels.com/blog/wp-content/uploads/2019/06/Shri-Mahalakshmi-Temple-Kolhapur.jpg"
                alt="Mahalakshmi Temple">
            <p>Mahalakshmi Temple</p>
        </div>

        <div class="item">
            <img src="https://www.holidify.com/images/cmsuploads/compressed/798px-Kolhapur_New_Palace_20190704134939.jpg"
                alt="New Palace">
            <p>New Palace</p>
        </div>

        <div class="item">
            <img src="https://cdn1.tripoto.com/media/filter/nl/img/2380291/Image/1708947507_jyotiba_temple_outside.jpg.webp"
                alt="Jyotiba Temple">
            <p>Jyotiba Temple</p>
        </div>

        <div class="item">
            <img src="https://media-cdn.tripadvisor.com/media/photo-s/10/bf/de/72/rankala-lake.jpg"
                alt="Rankala Lake">
            <p>Rankala Lake</p>
        </div>
         <div class="item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBwldp8pjEOik0Pg3FuKWfgx-_R7maFnqUwg&s"
                alt="Panhala Fort">
            <p>Panhala Fort</p>
        </div>

    </div>

</body>

</html>
